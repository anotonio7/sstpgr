{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4>Editar Funcionário</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="nome" name="nome" value="{{ f.nome }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" name="cpf" value="{{ f.cpf }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="matricula_esocial" class="form-label">Matrícula eSocial</label>
                        <input type="text" class="form-control" id="matricula_esocial" name="matricula_esocial" value="{{ f.matricula_esocial or '' }}" required>
                        <small class="text-muted">Obrigatória para eventos S-2240</small>
                    </div>
                    <div class="mb-3">
                        <label for="cbo" class="form-label">CBO (Código da Ocupação)</label>
                        <input type="text" class="form-control" id="cbo" name="cbo" value="{{ f.cbo or '' }}" required placeholder="Ex: 411010" pattern="\d{6}">
                        <small class="text-muted">6 dígitos. Obrigatório para S-2240.</small>
                    </div>
                    <div class="mb-3">
                        <label for="nascimento" class="form-label">Data de Nascimento</label>
                        <input type="date" class="form-control" id="nascimento" name="nascimento" value="{{ f.nascimento.strftime('%Y-%m-%d') if f.nascimento else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="admissao" class="form-label">Data de Admissão</label>
                        <input type="date" class="form-control" id="admissao" name="admissao" value="{{ f.admissao.strftime('%Y-%m-%d') if f.admissao else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="funcao" class="form-label">Função/Cargo</label>
                        <input type="text" class="form-control" id="funcao" name="funcao" value="{{ f.funcao }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="empresa_id" class="form-label">Empresa</label>
                        <select class="form-select" id="empresa_id" name="empresa_id" required>
                            {% for empresa in empresas %}
                            <option value="{{ empresa.id }}" {% if empresa.id == f.empresa_id %}selected{% endif %}>{{ empresa.nome }} ({{ empresa.cnpj }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Atualizar</button>
                    <a href="{{ url_for('list_funcionarios') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
