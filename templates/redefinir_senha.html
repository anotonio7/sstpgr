{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5">
            <div class="card-header bg-info text-white">
                <h4 class="text-center mb-0">Redefinir Senha</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Nova Senha (mínimo 6 caracteres)</label>
                        <input type="password" name="nova_senha" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Confirmar Nova Senha</label>
                        <input type="password" name="confirmar_senha" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-info w-100 text-white">Redefinir Senha</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
