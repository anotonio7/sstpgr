{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <div>
                <h4><i class="bi bi-send"></i> Nova Avalia??o Psicossocial</h4>
                <small>Cliente: {{ cliente.nome }}</small>
            </div>
            <!-- Botão para gerar PDF do PGR (relatório completo) -->
            <a href="{{ url_for('gerar_pgr_pdf') }}" class="btn btn-success" target="_blank">
                <i class="bi bi-file-pdf"></i> Gerar PGR completo (PDF)
            </a>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle"></i> O funcion?rio receber? um link por email para responder o question?rio.
                </div>

                <div class="mb-3">
                    <label for="nome_funcionario" class="form-label">Nome do Funcion?rio *</label>
                    <input type="text" class="form-control" id="nome_funcionario" name="nome_funcionario" required>
                </div>

                <div class="mb-3">
                    <label for="email_funcionario" class="form-label">Email do Funcion?rio *</label>
                    <input type="email" class="form-control" id="email_funcionario" name="email_funcionario" required>
                    <div class="form-text">O link da avalia??o ser? enviado para este email.</div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="cargo" class="form-label">Cargo *</label>
                            <input type="text" class="form-control" id="cargo" name="cargo" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="setor" class="form-label">Setor *</label>
                            <input type="text" class="form-control" id="setor" name="setor" required>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-envelope"></i> Enviar Avalia??o
                    </button>
                    <div>
                        <a href="{{ url_for('listar_clientes') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
