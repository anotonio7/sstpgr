{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>Editar Exame Toxicológico (S-2221)</h2>

    <form method="POST" id="formS2221">
        <!-- REMOVA o action, pois o POST vai para a mesma URL -->

        <div class="mb-3">
            <label>Funcionário *</label>
            <select name="funcionario_id" class="form-select" required>
                <option value="">Selecione</option>
                {% for f in funcionarios %}
                <option value="{{ f.id }}" {% if f.id == evento.funcionario_id %}selected{% endif %}>
                    {{ f.nome }} (CPF: {{ f.cpf }}) - Matr: {{ f.matricula_esocial or 'NÃO INFORMADA' }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Data do Exame *</label>
            <input type="date" name="data_exame" class="form-control"
                   value="{{ evento.data_exame.strftime('%Y-%m-%d') }}" required>
        </div>

        <div class="mb-3">
            <label>Tipo de Exame *</label>
            <input type="text" name="tipo_exame" class="form-control"
                   value="{{ evento.tipo_exame }}" required>
        </div>

        <div class="mb-3">
            <label>Resultado *</label>
            <textarea name="resultado" class="form-control" rows="3" required>{{ evento.resultado }}</textarea>
        </div>

        <div class="mb-3">
            <label>Laboratório</label>
            <input type="text" name="laboratorio" class="form-control"
                   value="{{ evento.laboratorio or '' }}">
        </div>

        <div class="mb-3">
            <label>CPF do Responsável *</label>
            <input type="text" name="cpf_responsavel" class="form-control"
                   value="{{ evento.cpf_responsavel }}" required
                   placeholder="000.000.000-00">
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{{ url_for('list_s2221') }}" class="btn btn-danger">Cancelar</a>
    </form>
</div>

<script>
function validarCPF(cpf) {
    cpf = cpf.replace(/[^\d]/g, '');
    if (cpf.length !== 11) return false;
    if (/^(\d)\1{10}$/.test(cpf)) return false;

    let soma = 0;
    for (let i = 0; i < 9; i++) {
        soma += parseInt(cpf.charAt(i)) * (10 - i);
    }
    let resto = 11 - (soma % 11);
    let digito1 = resto >= 10 ? 0 : resto;
    if (digito1 !== parseInt(cpf.charAt(9))) return false;

    soma = 0;
    for (let i = 0; i < 10; i++) {
        soma += parseInt(cpf.charAt(i)) * (11 - i);
    }
    resto = 11 - (soma % 11);
    let digito2 = resto >= 10 ? 0 : resto;
    return digito2 === parseInt(cpf.charAt(10));
}

document.querySelector('input[name="cpf_responsavel"]').addEventListener('blur', function() {
    if (this.value && !validarCPF(this.value)) {
        alert('CPF inválido!');
        this.value = '';
        this.focus();
    }
});

document.getElementById('formS2221').addEventListener('submit', (e) => {
    const cpf = document.querySelector('input[name="cpf_responsavel"]').value;
    if (cpf && !validarCPF(cpf)) {
        e.preventDefault();
        alert('CPF inválido!');
    }
});
</script>
{% endblock %}
