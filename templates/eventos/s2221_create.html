{% extends "base.html" %}
{% block content %}
<h2>Novo Evento S-2221 – Exame Toxicológico</h2>
<form method="POST" id="formS2221" action="{{ url_for('processar_s2221') }}">
    <div class="mb-3">
        <label>Funcionário</label>
        <select name="funcionario_id" id="funcionario_id" class="form-select" required>
            <option value="">Selecione</option>
            {% for f in funcionarios %}
            <option value="{{ f.id }}"
                    data-cpf="{{ f.cpf }}"
                    data-matricula="{{ f.matricula_esocial or '' }}"
                    data-cbo="{{ f.cbo or '' }}">
                {{ f.nome }} (CPF: {{ f.cpf }}) - Matr: {{ f.matricula_esocial or 'NÃO INFORMADA' }} - CBO: {{ f.cbo or 'NÃO INFORMADO' }}
            </option>
            {% endfor %}
        </select>
    </div>

    <!-- Exibir dados do funcionário (readonly) -->
    <div class="row mb-3">
        <div class="col-md-4">
            <label>CPF do Funcionário</label>
            <input type="text" id="cpf_trab" class="form-control" readonly>
        </div>
        <div class="col-md-4">
            <label>Matrícula eSocial</label>
            <input type="text" id="matricula_trab" class="form-control" readonly>
        </div>
        <div class="col-md-4">
            <label>CBO</label>
            <input type="text" id="cbo_trab" class="form-control" readonly>
        </div>
    </div>

    <div class="mb-3">
        <label>Data do Exame</label>
        <input type="date" name="data_exame" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Tipo de Exame</label>
        <input type="text" name="tipo_exame" class="form-control" required placeholder="Ex: Toxicológico para motorista">
    </div>
    <div class="mb-3">
        <label>Resultado</label>
        <textarea name="resultado" class="form-control" rows="3" required placeholder="Descreva o resultado do exame"></textarea>
    </div>
    <div class="mb-3">
        <label>Laboratório</label>
        <input type="text" name="laboratorio" class="form-control" placeholder="Nome do laboratório responsável">
    </div>
    <div class="mb-3">
        <label>CPF do Responsável (Médico/Profissional)</label>
        <input type="text" name="cpf_responsavel" class="form-control" required
               placeholder="000.000.000-00" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}">
        <small class="text-muted">CPF do médico ou profissional que emitiu o laudo</small>
    </div>

    <button type="submit" class="btn btn-primary">Salvar e Gerar XML</button>
    <button type="button" id="btnGerarXML" class="btn btn-secondary">Somente Gerar XML</button>
    <a href="{{ url_for('list_s2221') }}" class="btn btn-danger">Cancelar</a>
</form>

<script>
// Preencher campos do funcionário ao selecionar
document.getElementById('funcionario_id').addEventListener('change', function() {
    const selected = this.options[this.selectedIndex];
    document.getElementById('cpf_trab').value = selected.getAttribute('data-cpf') || '';
    document.getElementById('matricula_trab').value = selected.getAttribute('data-matricula') || '';
    document.getElementById('cbo_trab').value = selected.getAttribute('data-cbo') || '';
});

async function enviarForm(apenasGerarXml = false) {
    const formData = new FormData(document.getElementById('formS2221'));
    if (apenasGerarXml) formData.append('apenas_xml', 'true');
    const response = await fetch("{{ url_for('processar_s2221') }}", {
        method: 'POST',
        body: formData
    });
    if (response.ok) {
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'evento_S2221.xml';
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        if (!apenasGerarXml) window.location.href = "{{ url_for('list_s2221') }}";
    } else {
        const error = await response.text();
        alert("Erro: " + error);
    }
}

document.getElementById('formS2221').addEventListener('submit', (e) => {
    e.preventDefault();
    enviarForm(false);
});
document.getElementById('btnGerarXML').addEventListener('click', () => {
    enviarForm(true);
});
</script>
{% endblock %}
