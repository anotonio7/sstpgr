{% extends "base.html" %}
{% block content %}
<h2>Editar Evento S-2240</h2>
<form method="POST" id="formS2240" action="{{ url_for('update_s2240', id=evento.id) }}">
    <div class="mb-3">
        <label>Funcionário</label>
        <select name="funcionario_id" id="funcionario_id" class="form-select" required>
            <option value="">Selecione</option>
            {% for f in funcionarios %}
            <option value="{{ f.id }}"
                    data-cpf="{{ f.cpf }}"
                    data-matricula="{{ f.matricula }}"
                    data-cbo="{{ f.cbo }}"
                    {% if f.id == evento.funcionario_id %}selected{% endif %}>
                {{ f.nome }} (CPF: {{ f.cpf }}) - Matr: {{ f.matricula }} - CBO: {{ f.cbo }}
            </option>
            {% endfor %}
        </select>
    </div>

    <!-- Exibir dados do funcionário selecionado (readonly) -->
    <div class="row mb-3">
        <div class="col-md-4">
            <label>CPF do Funcionário</label>
            <input type="text" id="cpf_trab" class="form-control" readonly>
        </div>
        <div class="col-md-4">
            <label>Matrícula (eSocial)</label>
            <input type="text" id="matricula_trab" class="form-control" readonly>
        </div>
        <div class="col-md-4">
            <label>CBO (Código da Ocupação)</label>
            <input type="text" id="cbo_trab" class="form-control" readonly>
        </div>
    </div>

    <div class="mb-3">
        <label>Data da Avaliação</label>
        <input type="date" name="data_avaliacao"
               value="{{ evento.data_avaliacao.strftime('%Y-%m-%d') }}"
               class="form-control" required>
    </div>

    <div class="mb-3">
        <label>CPF do Avaliador (Responsável Técnico)</label>
        <input type="text" name="cpf_avaliador" class="form-control" required
               value="{{ evento.cpf_avaliador or '' }}"
               placeholder="000.000.000-00" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
               title="Digite um CPF válido (ex: 123.456.789-00)">
    </div>

    <!-- Bloco de Riscos Ambientais (Tabela 24) -->
    <div class="card mb-3">
        <div class="card-header">
            <strong>Riscos Ambientais (Tabela 24 – Agentes Nocivos)</strong>
            <button type="button" class="btn btn-sm btn-success float-end" id="btnAdicionarRisco">
                + Adicionar Risco
            </button>
        </div>
        <div class="card-body" style="max-height: 400px; overflow-y: auto;">
            <table class="table table-sm table-bordered" id="tabelaRiscos">
                <thead>
                    <tr>
                        <th>Agente Nocivo (Tabela 24)</th>
                        <th>Intensidade / Concentração</th>
                        <th>EPI Utilizado</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="riscosContainer">
                    <!-- Linhas serão inseridas via JS com os riscos existentes -->
                </tbody>
            </table>
        </div>
    </div>

    <button type="submit" class="btn btn-primary">Atualizar e Gerar XML</button>
    <button type="button" id="btnGerarXML" class="btn btn-secondary">Somente Gerar XML</button>
    <a href="{{ url_for('list_s2240') }}" class="btn btn-danger">Cancelar</a>
</form>

<script>
// Tabela 24 fornecida pelo backend
const tabela24 = {{ tabela24 | tojson }};

// Riscos já cadastrados neste evento (passado pelo backend)
const riscosExistentes = {{ riscos | tojson }};

function criarLinhaRisco(agenteCod = '', intensidade = '', epi = '') {
    const row = document.createElement('tr');
    let selectHtml = `<select name="agente_codigo[]" class="form-select form-select-sm" required>`;
    selectHtml += `<option value="">Selecione...</option>`;
    for (let item of tabela24) {
        let selected = (item.codigo == agenteCod) ? 'selected' : '';
        selectHtml += `<option value="${item.codigo}" ${selected}>${item.codigo} - ${item.descricao}</option>`;
    }
    selectHtml += `</select>`;

    row.innerHTML = `
        <td>${selectHtml}</td>
        <td><input type="text" name="intensidade[]" class="form-control form-control-sm" value="${intensidade}" placeholder="Ex: 85 dB(A)"></td>
        <td><input type="text" name="epi_utilizado[]" class="form-control form-control-sm" value="${epi}" placeholder="CA / descrição"></td>
        <td><button type="button" class="btn btn-sm btn-danger removerLinha">Remover</button></td>
    `;
    row.querySelector('.removerLinha').addEventListener('click', () => row.remove());
    return row;
}

// Preencher campos do funcionário ao selecionar
function preencherDadosFuncionario() {
    const select = document.getElementById('funcionario_id');
    const selectedOption = select.options[select.selectedIndex];
    const cpf = selectedOption.getAttribute('data-cpf') || '';
    const matricula = selectedOption.getAttribute('data-matricula') || '';
    const cbo = selectedOption.getAttribute('data-cbo') || '';
    document.getElementById('cpf_trab').value = cpf;
    document.getElementById('matricula_trab').value = matricula;
    document.getElementById('cbo_trab').value = cbo;
}

document.getElementById('funcionario_id').addEventListener('change', preencherDadosFuncionario);
// Executar na carga inicial
preencherDadosFuncionario();

// Carregar os riscos existentes
const container = document.getElementById('riscosContainer');
if (riscosExistentes && riscosExistentes.length) {
    for (let risco of riscosExistentes) {
        container.appendChild(criarLinhaRisco(risco.codigo_agente, risco.intensidade, risco.epi));
    }
} else {
    // Adiciona uma linha vazia se não houver riscos
    container.appendChild(criarLinhaRisco());
}

document.getElementById('btnAdicionarRisco').addEventListener('click', () => {
    container.appendChild(criarLinhaRisco());
});

// Função para enviar o formulário (salvar ou apenas gerar XML)
async function enviarForm(apenasGerarXml = false) {
    const formData = new FormData(document.getElementById('formS2240'));
    if (apenasGerarXml) {
        formData.append('apenas_xml', 'true');
    }
    const response = await fetch("{{ url_for('processar_s2240_edit', id=evento.id) }}", {
        method: 'POST',
        body: formData
    });
    if (response.ok) {
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'evento_S2240.xml';
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
        if (!apenasGerarXml) {
            window.location.href = "{{ url_for('list_s2240') }}";
        }
    } else {
        const error = await response.text();
        alert("Erro: " + error);
    }
}

document.getElementById('formS2240').addEventListener('submit', (e) => {
    e.preventDefault();
    enviarForm(false);
});
document.getElementById('btnGerarXML').addEventListener('click', () => {
    enviarForm(true);
});
</script>
{% endblock %}
