{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4>Avaliação Psicossocial</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                <h5>Funcionário: {{ avaliacao.nome_funcionario }}</h5>
                <h5>Cargo: {{ avaliacao.cargo }} | Setor: {{ avaliacao.setor }}</h5>
                <hr>

                <div class="mb-3">
                    <label>1. Como você avalia seu nível de estresse no trabalho? (1=Muito baixo, 5=Muito alto)</label>
                    <select name="q1" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="1">1 - Muito baixo</option>
                        <option value="2">2 - Baixo</option>
                        <option value="3">3 - Moderado</option>
                        <option value="4">4 - Alto</option>
                        <option value="5">5 - Muito alto</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>2. Você sente que tem controle sobre suas atividades? (1=Nunca, 5=Sempre)</label>
                    <select name="q2" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="1">1 - Nunca</option>
                        <option value="2">2 - Raramente</option>
                        <option value="3">3 - Às vezes</option>
                        <option value="4">4 - Frequentemente</option>
                        <option value="5">5 - Sempre</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>3. Como você avalia o apoio da sua liderança? (1=Muito ruim, 5=Muito bom)</label>
                    <select name="q3" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="1">1 - Muito ruim</option>
                        <option value="2">2 - Ruim</option>
                        <option value="3">3 - Regular</option>
                        <option value="4">4 - Bom</option>
                        <option value="5">5 - Muito bom</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>4. Você se sente sobrecarregado com a quantidade de trabalho? (1=Nunca, 5=Sempre)</label>
                    <select name="q4" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="1">1 - Nunca</option>
                        <option value="2">2 - Raramente</option>
                        <option value="3">3 - Às vezes</option>
                        <option value="4">4 - Frequentemente</option>
                        <option value="5">5 - Sempre</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>5. Como você avalia o relacionamento com seus colegas? (1=Muito ruim, 5=Muito bom)</label>
                    <select name="q5" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="1">1 - Muito ruim</option>
                        <option value="2">2 - Ruim</option>
                        <option value="3">3 - Regular</option>
                        <option value="4">4 - Bom</option>
                        <option value="5">5 - Muito bom</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>6. Você tem autonomia para tomar decisões no seu trabalho? (1=Nunca, 5=Sempre)</label>
                    <select name="q6" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="1">1 - Nunca</option>
                        <option value="2">2 - Raramente</option>
                        <option value="3">3 - Às vezes</option>
                        <option value="4">4 - Frequentemente</option>
                        <option value="5">5 - Sempre</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>7. Como você avalia o reconhecimento pelo seu trabalho? (1=Muito ruim, 5=Muito bom)</label>
                    <select name="q7" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="1">1 - Muito ruim</option>
                        <option value="2">2 - Ruim</option>
                        <option value="3">3 - Regular</option>
                        <option value="4">4 - Bom</option>
                        <option value="5">5 - Muito bom</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>8. Você consegue conciliar trabalho e vida pessoal? (1=Nunca, 5=Sempre)</label>
                    <select name="q8" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="1">1 - Nunca</option>
                        <option value="2">2 - Raramente</option>
                        <option value="3">3 - Às vezes</option>
                        <option value="4">4 - Frequentemente</option>
                        <option value="5">5 - Sempre</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>9. Você tem sintomas físicos relacionados ao trabalho? (1=Nunca, 5=Sempre)</label>
                    <select name="q9" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="1">1 - Nunca</option>
                        <option value="2">2 - Raramente</option>
                        <option value="3">3 - Às vezes</option>
                        <option value="4">4 - Frequentemente</option>
                        <option value="5">5 - Sempre</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>10. Como você avalia sua satisfação geral no trabalho? (1=Muito baixa, 5=Muito alta)</label>
                    <select name="q10" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option value="1">1 - Muito baixa</option>
                        <option value="2">2 - Baixa</option>
                        <option value="3">3 - Regular</option>
                        <option value="4">4 - Alta</option>
                        <option value="5">5 - Muito alta</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Enviar Avaliação</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
