{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Cadastrar Novo Funcionário</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="nome">Nome Completo *</label>
                            <input type="text" class="form-control" id="nome" name="nome" required>
                        </div>

                        <div class="form-group">
                            <label for="cpf">CPF *</label>
                            <input type="text" class="form-control" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                        </div>

                        <div class="form-group">
                            <label for="matricula_esocial">Matrícula eSocial</label>
                            <input type="text" class="form-control" id="matricula_esocial" name="matricula_esocial">
                        </div>

                        <div class="form-group">
                            <label for="cbo">CBO (Código Brasileiro de Ocupação) *</label>
                            <input type="text" class="form-control" id="cbo" name="cbo" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="nascimento">Data de Nascimento *</label>
                                <input type="date" class="form-control" id="nascimento" name="nascimento" required>
                            </div>

                            <div class="form-group col-md-6">
                                <label for="admissao">Data de Admissão *</label>
                                <input type="date" class="form-control" id="admissao" name="admissao" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="funcao">Função/Cargo *</label>
                            <input type="text" class="form-control" id="funcao" name="funcao" required>
                        </div>

                        <div class="form-group">
                            <label for="empresa_id">Empresa *</label>
                            <select class="form-control" id="empresa_id" name="empresa_id" required>
                                <option value="">Selecione uma empresa</option>
                                {% for empresa in empresas %}
                                <option value="{{ empresa.id }}">{{ empresa.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">
                                Salvar
                            </button>
                            <a href="{{ url_for('list_funcionarios') }}" class="btn btn-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
