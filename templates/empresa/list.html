{% extends "base.html" %}
{% block content %}
<h2>Empresas</h2>
<a href="{{ url_for('create_empresa') }}" class="btn btn-primary mb-3">Nova Empresa</a>
<table class="table table-striped">
    <thead>…
        <th>ID</th><th>Nome</th><th>CNPJ</th><th>Ações</th>
    </tr></thead>
    <tbody>
        {% for e in empresas %}
        <tr>
            <td>{{ e.id }}</td>
            <td>{{ e.nome }}</td>
            <td>{{ e.cnpj }}</td>
            <td>
                <a href="{{ url_for('edit_empresa', id=e.id) }}" class="btn btn-sm btn-warning">Editar</a>
                <a href="{{ url_for('delete_empresa', id=e.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
