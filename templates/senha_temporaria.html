{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5">
            <div class="card-header bg-success text-white">
                <h4 class="text-center mb-0">Senha Temporária Gerada</h4>
            </div>
            <div class="card-body text-center">
                <p>Usuário: <strong>{{ username }}</strong></p>
                <p>Sua nova senha temporária é:</p>
                <div class="alert alert-info">
                    <strong style="font-size: 1.5rem;">{{ senha }}</strong>
                </div>
                <p>Utilize esta senha para fazer login. Depois de logado, você pode alterá-la no seu perfil.</p>
                <a href="{{ url_for('login') }}" class="btn btn-primary">Ir para o login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
