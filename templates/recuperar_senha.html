{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5">
            <div class="card-header bg-warning">
                <h4 class="text-center mb-0">Recuperar Senha</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Digite seu email para receber o link de recuperação</p>
                <form method="POST">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Enviar Link</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{{ url_for('login') }}">Voltar para o login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
